name: CI

on:
  push:
    branches: ['release/**']
  pull_request:
    branches: ['release/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew :compose-app:compileKotlin --no-daemon
