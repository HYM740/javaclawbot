name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew :compose-app:distZip --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: javaclawbot-${{ github.ref_name }}
          path: compose-app/build/distributions/*.zip
